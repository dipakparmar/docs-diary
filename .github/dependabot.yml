version: 2
updates:
  # Enable version updates for bun
  - package-ecosystem: "bun"
    # Look for `package.json` and `bun.lock` in the root directory
    directory: "/"
    schedule:
      interval: "weekly"
    versioning-strategy: increase-if-necessary
    open-pull-requests-limit: 10
    # Only adopt versions published at least 3 days ago (matches bunfig.toml)
    cooldown:
      default-days: 3
    groups:
      # Docusaurus is a monorepo — all @docusaurus/* must bump together,
      # majors included, so keep it as its own group.
      docusaurus:
        patterns:
          - "@docusaurus/*"
      # Everything else: batch safe minor/patch into one PR; majors stay
      # ungrouped so each breaking bump gets its own PR to review in isolation.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Enable version updates for GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: ".github/workflows"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 3
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
